schemaVersion: "1.0"
name: "Gatekeeper App Store Only"
description: "Fixture-backed System Policy Control validation for the intentionally broken Demo 4 state."
fidelity: "Green"
expectedCheckpoint: "Broken-Policy-State"
requiresHardwareSignoff: false
hostMacOS: "26.4.1"
hostMacOSBuild: "25E253"
guestMacOS: "26.4.1"
guestBuild: "25E253"
hostGuestCompatibility: "same-major-supported"
tests:
  - name: "MDM enrollment profile present"
    kind: "MdmEnrollmentProfile"
    result: "Pass"
    expectedFailure: false
    evidenceRefs:
      - "fixtures/profiles-system-policy-control-redacted.txt"
  - name: "Gatekeeper assessment enabled"
    kind: "GatekeeperStatus"
    expectedAssessmentEnabled: true
    expectedFailure: false
    fixture: "fixtures/gatekeeper-status-appstore-only.txt"
  - name: "System Policy Control profile detected"
    kind: "SystemPolicyControlProfile"
    expectedProfilePresent: true
    expectedFailure: false
    fixture: "fixtures/profiles-system-policy-control-redacted.txt"
  - name: "VS Code blocked by App-Store-only policy"
    kind: "GatekeeperAssessment"
    result: "Fail"
    expectedFailure: true
    expectedAssessment: "Rejected"
    message: "VS Code rejected by App-Store-only System Policy Control policy."
    fixture: "fixtures/gatekeeper-vscode-rejected.txt"
  - name: "Blocking dialog captured"
    kind: "AppLaunchBlocked"
    result: "Pass"
    expectedFailure: false
    fixture: "fixtures/app-launch-vscode-blocked-dialog.txt"
  - name: "Evidence redaction applied"
    kind: "RedactionVerification"
    result: "Pass"
    expectedFailure: false
    evidenceRefs:
      - "docs/Evidence-Redaction.md"
