# Pre-commit CI Workflow
#
# Purpose: Run the full pre-commit hook set as the aggregate repository hygiene
# gate. Python is installed only because pre-commit and retained hooks such as
# check-jsonschema are Python-based development tooling; macOSLab has no Python
# project source.

name: Pre-commit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python for pre-commit tooling
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
