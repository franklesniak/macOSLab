# Data file linting CI Workflow
#
# Purpose: Run JSON, YAML, and GitHub Actions workflow validation as a
# first-class, dedicated CI workflow alongside the other per-language
# workflows (precommit-ci.yml, powershell-ci.yml, markdownlint.yml).
#
# Hooks executed (all from .pre-commit-config.yaml):
#   - check-json        — strict JSON syntax (.json only; .jsonc excluded)
#   - check-yaml        — YAML parse check (.yml / .yaml)
#   - yamllint          — YAML style enforcement per .yamllint.yml
#   - actionlint        — GitHub Actions workflow linting
#   - check-jsonschema  — JSON Schema validation. This single
#                         `pre-commit run check-jsonschema --all-files`
#                         invocation runs every hook sharing the
#                         `check-jsonschema` ID, including:
#                           * the worked-example schema validation
#                             (`schemas/examples/example-config/valid/`),
#                           * real load-bearing repository config
#                             validation against built-in vendor schemas
#                             shipped with `check-jsonschema` (currently
#                             `.github/dependabot.yml` against
#                             `vendor.dependabot`), and
#                           * any additional `check-jsonschema` hooks
#                             downstream consumers configure.
#                         The aggregate-step (Option B) strategy is used
#                         here rather than one CI step per hook alias
#                         (Option A); individual hooks are still
#                         independently runnable locally via
#                         `pre-commit run <alias> --all-files` (for
#                         example, `validate-dependabot-config`).
#                         Self-validation of the schema itself is wired as
#                         a separate `check-metaschema` hook in
#                         `.pre-commit-config.yaml`.
#
# Design Decisions:
#
# 1. CI Ownership / Relationship to precommit-ci.yml:
#    `precommit-ci.yml` runs the full `pre-commit run --all-files`
#    pipeline as the single canonical aggregate pre-commit gate. This
#    workflow does NOT replace that — it adds dedicated visibility and a
#    distinct required-check identity for JSON/YAML/Actions validation so
#    branch protection rules and contributors can reason about data-file
#    quality independently from the aggregate pre-commit gate.
#
#    Trade-off: the JSON/YAML/actionlint hooks run in both workflows. This
#    duplication is intentional and accepted in exchange for clearer
#    ownership and parity with the other per-language workflows. See the
#    "Dedicated data-file CI workflow (data-ci.yml)" entry in
#    `.github/TEMPLATE_DESIGN_DECISIONS.md` for the full rationale.
#
# 2. Relationship to auto-fix-precommit.yml:
#    `.github/workflows/auto-fix-precommit.yml` is intentionally NOT a peer
#    of this workflow. It is a fix-up workflow scoped to `copilot/**`
#    branches that auto-applies pre-commit fixes; it is not a contract
#    enforcement gate. `data-ci.yml` is a contract enforcement gate for all
#    PRs and pushes.
#
# 3. Template Repository Trigger Policy:
#    This workflow does NOT use path-based filtering. This repository is a
#    repository bootstrap, and active workflows intentionally avoid path filters
#    so the workflow itself is exercised on every change. This workflow runs on
#    all pushes and pull requests, plus `workflow_dispatch` to match
#    `precommit-ci.yml`.
#
# 4. Job and Workflow Naming:
#    The workflow name (`Data file linting`) and job name (`Data file
#    linting`) are deliberately distinct from `Pre-commit` so branch
#    protection rules can require data-file validation independently.

name: Data file linting

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-file-linting:
    name: Data file linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python for pre-commit tooling
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run check-json
        run: pre-commit run check-json --all-files

      - name: Run check-yaml
        run: pre-commit run check-yaml --all-files

      - name: Run yamllint
        run: pre-commit run yamllint --all-files

      - name: Run actionlint
        run: pre-commit run actionlint --all-files

      - name: Run check-jsonschema
        # `pre-commit run <hook-id> --all-files` runs all hooks sharing the
        # given ID, so this single invocation covers every check-jsonschema
        # hook configured in `.pre-commit-config.yaml`, including the
        # worked-example schema validation and the real load-bearing
        # repository config validation (currently `.github/dependabot.yml`
        # against the bundled `vendor.dependabot` schema). The companion
        # `check-metaschema` hook (schema self-validation) is invoked
        # separately below because it has a distinct hook ID.
        run: pre-commit run check-jsonschema --all-files

      - name: Run check-metaschema
        run: pre-commit run check-metaschema --all-files
