name: Bug Report
description: Report a macOSLab bug or unexpected behavior.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        Security vulnerabilities must be reported privately through [GitHub private vulnerability reporting](https://github.com/franklesniak/macOSLab/security/advisories/new), not through this form.

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reviewed the current README or planning docs that apply to this behavior.
          required: false
        - label: This is not a security vulnerability.
          required: true
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - PowerShell module
        - PowerShell scripts
        - Pester tests
        - Markdown / Documentation
        - GitHub Actions / CI
        - JSON / YAML / schema validation
        - Parallels provider
        - UTM provider
        - Evidence / redaction
        - Other
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      render: text
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs_output
    attributes:
      label: Logs or Error Output
      description: Review logs for secrets, tenant identifiers, recovery keys, tokens, and personal data before pasting.
      render: text
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      render: text
      placeholder: |
        Host macOS version/build:
        PowerShell version:
        Provider: Parallels / UTM / Tart stub
        Provider version:
        Pester version, if relevant:
    validations:
      required: false

  - type: textarea
    id: commands
    attributes:
      label: Commands Used
      render: text
      placeholder: |
        pwsh -File ./scripts/Test-LabReadiness.ps1
        Invoke-Pester -Path tests/ -Output Detailed
    validations:
      required: false

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Consistent
        - Intermittent
        - Unable to reproduce reliably
        - Only happened once
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
    validations:
      required: false
