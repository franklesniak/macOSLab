# GitHub issue template chooser configuration.
# Contact link URLs must be absolute GitHub URLs.

blank_issues_enabled: true

contact_links:
  - name: Contributing Guide
    url: https://github.com/franklesniak/macOSLab/blob/HEAD/CONTRIBUTING.md
