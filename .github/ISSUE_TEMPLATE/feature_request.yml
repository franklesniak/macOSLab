name: Feature Request
description: Suggest a macOSLab feature or enhancement.
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues and discussions for this request.
          required: true
        - label: I checked the current planning docs or TODO files for related deferred work.
          required: false
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement / Motivation
      description: Describe the problem this feature would solve.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - PowerShell module
        - PowerShell scripts
        - Pester tests
        - Markdown / Documentation
        - GitHub Actions / CI
        - JSON / YAML / schema validation
        - Parallels provider
        - UTM provider
        - Tart stub / advanced path
        - Evidence / redaction
        - Other
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives Considered
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
    validations:
      required: false
