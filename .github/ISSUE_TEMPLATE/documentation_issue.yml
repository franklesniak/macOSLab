name: Documentation Issue
description: Report unclear, missing, outdated, or broken documentation.
title: "[Docs] "
labels:
  - documentation
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues for this documentation problem.
          required: true
        - label: This is about documentation content, not functional behavior.
          required: true
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong or missing?
      description: Describe the documentation issue clearly.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is it?
      description: Link to the file, section, or page where the issue exists.
      placeholder: e.g., README.md#validation or docs/spec/macOSLab-repository-spec.md
    validations:
      required: false

  - type: dropdown
    id: doc_issue_type
    attributes:
      label: Issue Type
      options:
        - Typo / Grammar
        - Unclear / Confusing
        - Missing Information
        - Broken Link
        - Outdated Information
        - Code Example Issue
        - Formatting / Rendering
        - Other
    validations:
      required: false

  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested Change
    validations:
      required: false
